<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miro Store - Moodada Casriga Ah</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFFFFF] font-sans antialiased">

  <!-- HEADER -->
  <header class="bg-[#0A1F44] text-[#FFFFFF] sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <span class="text-2xl font-black tracking-wider text-[#FBBF24]">MIRO STORE</span>
    </div>
  </header>

  <!-- MAIN SECTION -->
  <main class="py-16">
    <div class="max-w-7xl mx-auto px-4">
      <div class="text-center mb-12"> 
        <h2 class="text-3xl font-extrabold text-[#0A1F44] sm:text-4xl">Alaabta Cusub</h2> 
      </div> 
      
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"> 
        
        <!-- Fanaanad Gacmo-gaab --> 
        <div class="bg-[#0A1F44]/5 p-4 rounded-xl border border-[#0A1F44]/10"> 
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" class="w-full h-64 object-cover rounded-lg"> 
            <h3 class="mt-4 font-semibold text-[#0A1F44]">Fanaanad Gacmo-gaab</h3> 
            <p class="font-bold text-[#0A1F44]">$12.00</p> 
            <button class="w-full mt-4 bg-[#0A1F44] text-white py-2 rounded-lg">Hadda Iibso</button> 
        </div> 

        <!-- Fanaanad Gacmo-dheer --> 
        <div class="bg-[#0A1F44]/5 p-4 rounded-xl border border-[#0A1F44]/10"> 
            <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=500" class="w-full h-64 object-cover rounded-lg"> 
            <h3 class="mt-4 font-semibold text-[#0A1F44]">Fanaanad Gacmo-dheer</h3> 
            <p class="font-bold text-[#0A1F44]">$18.00</p> 
            <button class="w-full mt-4 bg-[#0A1F44] text-white py-2 rounded-lg">Hadda Iibso</button> 
        </div> 

        <!-- Surwaal Turkish Ah --> 
        <div class="bg-[#0A1F44]/5 p-4 rounded-xl border border-[#0A1F44]/10"> 
            <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?w=500" class="w-full h-64 object-cover rounded-lg"> 
            <h3 class="mt-4 font-semibold text-[#0A1F44]">Surwaal Turkish Ah</h3> 
            <p class="font-bold text-[#0A1F44]">$18.90</p> 
            <button class="w-full mt-4 bg-[#0A1F44] text-white py-2 rounded-lg">Hadda Iibso</button> 
        </div> 

        <!-- Saacad (Tusaale) --> 
        <div class="bg-[#0A1F44]/5 p-4 rounded-xl border border-[#0A1F44]/10"> 
            <img src="watermarked_img_77975366302524715.png" class="w-full h-64 object-cover rounded-lg"> 
            <h3 class="mt-4 font-semibold text-[#0A1F44]">Saacad Classic</h3> 
            <p class="font-bold text-[#0A1F44]">$45.00</p> 
            <button class="w-full mt-4 bg-[#0A1F44] text-white py-2 rounded-lg">Hadda Iibso</button> 
        </div> 

      </div> 
    </div>
  </main>

  <footer class="bg-[#0A1F44] text-white py-8 text-center">
    <p>&copy; 2026 Miro Store.</p>
  </footer>

</body>
</html>
